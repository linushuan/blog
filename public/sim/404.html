<!DOCTYPE html>
<html lang="en">
<head><script src="/blog/sim/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=blog/sim/livereload" data-no-instant defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #888;
            --bg-color: #fafafa;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: "Inter", -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

         
        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -10px;
            color: #fff;
            text-shadow: 10px 10px 20px rgba(0,0,0,0.05);
            -webkit-text-stroke: 1px #ddd;  
            user-select: none;
        }

        .message {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--accent-color);
            margin: 2rem 0 3rem 0;
            letter-spacing: 2px;
        }

         
        .btn-home {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-color);
            color: #fff;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;  
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-home:hover {
            transform: translateY(-5px);  
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            background-color: #000;
        }

        .home-icon {
            width: 24px;  
            height: 24px;
            margin-right: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

         
        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid #eee;
            border-radius: 50%;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="decoration"></div>
    <div class="container">
        <h1 class="error-code">404</h1>
        <p class="message">PAGE NOT FOUND</p>

        <a href="/blog/sim" class="btn-home">
            <svg class="home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            BACK TO HOME
        </a>
    </div>
</body>
</html>
