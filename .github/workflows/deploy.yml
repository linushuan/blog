name: Deploy Dual-Theme Blog
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Dart Sass
        run: |
          curl -L https://github.com/sass/dart-sass/releases/download/1.77.1/dart-sass-1.77.1-linux-x64.tar.gz | tar -xz
          echo "$(pwd)/dart-sass" >> $GITHUB_PATH

      - name: Build Both Themes
        run: |
          rm -rf public
          hugo --config hugo-ani.toml --configDir config-ani
          hugo --config hugo-sim.toml

      - name: Create Root Redirect
        run: |
          cp public/ani/404.html public/404.html
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0.8; url=/blog/ani/">
              <title>Redirecting...</title>
              <style>
                  body {
                      margin: 0;
                      padding: 0;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      background: linear-gradient(45deg, #f8bbd0, #b3e5fc, #d1c4e9);
                      background-size: 400% 400%;
                      animation: gradient 5s ease infinite;
                      overflow: hidden;
                  }
                  .loader {
                      width: 50px;
                      height: 50px;
                      border: 5px solid rgba(255, 255, 255, 0.3);
                      border-radius: 50%;
                      border-top-color: #fff;
                      animation: spin 1s ease-in-out infinite;
                  }
                  @keyframes spin {
                      to { transform: rotate(360deg); }
                  }
                  @keyframes gradient {
                      0% { background-position: 0% 50%; }
                      50% { background-position: 100% 50%; }
                      100% { background-position: 0% 50%; }
                  }
              </style>
          </head>
          <body>
              <div class="loader"></div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
