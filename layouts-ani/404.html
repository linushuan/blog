<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404Error</title>
    <style>
        :root {
            --bg-color: #0d0015;
            --primary-color: #b100ff;
            --accent-color: #00f2ff;
            --text-color: #fff;
            --font-main: 'Fira Code', monospace;
            --bg-gif-url: url('{{ "atomic.gif" | relURL }}');
            --bg-gif-opacity: 0.18;
            --bg-gif-blend: screen;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            perspective: 1000px;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 5;
            animation: containerEntry 1s ease-out;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            margin: 0;
            position: relative;
            color: #fff;
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.75),
                        -0.025em -0.05em 0 rgba(0,255,0,0.75),
                        0.025em 0.05em 0 rgba(0,0,255,0.75);
            animation: glitch 500ms infinite;
        }

        .error-code::before, .error-code::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.8;
        }

        .error-code::before {
            animation: glitch 650ms infinite;
            color: var(--primary-color);
            z-index: -1;
            transform: translate(-2px, -2px);
        }

        .error-code::after {
            animation: glitch 375ms infinite;
            color: var(--accent-color);
            z-index: -2;
            transform: translate(2px, 2px);
        }

        .typing-text {
            font-size: 1.2rem;
            color: #ccc;
            margin: 2rem 0;
            height: 1.5rem;
            letter-spacing: 1px;
        }

        .typing-text::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        .character-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 3rem auto;
        }

        .character-img {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200%;        /* 加這行 */
            height: 200%;       /* 加這行 */
            z-index: 2;
            background-image: url('{{ "frieren.jpg" | relURL }}');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .btn-recall {
            display: inline-flex;
            align-items: center;
            padding: 15px 35px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            overflow: hidden;
            position: relative;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn-recall:hover {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
            transform: scale(1.05) rotate(-1deg);
        }

        .btn-recall::after {
            content: " ";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0));
            transform: rotate(45deg);
            animation: scanline 2s linear infinite;
        }

        .portal-icon {
            width: 18px; height: 18px;
            margin-right: 12px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.75), -0.025em -0.025em 0 rgba(0,255,0,0.75), -0.025em -0.05em 0 rgba(0,0,255,0.75); }
        }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes containerEntry { from { opacity: 0; transform: scale(0.8) translateZ(-100px); } to { opacity: 1; transform: scale(1) translateZ(0); } }
        @keyframes scanline { from { top: -100%; } to { top: 100%; } }
        @keyframes magicCircleRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-code" data-text="404">404</h1>

        <p class="typing-text" id="typingScript"></p>

        <div class="character-box">
            <div class="character-img"></div>
        </div>

        <a href="{{ .Site.BaseURL | relURL }}" class="btn-recall">
            <svg class="portal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M10 3H6a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h4M16 17l5-5-5-5M19.8 12H9"/>
            </svg>
            RECALL PROTOCOL
        </a>
    </div>

    <script>
        const phrases = [
            "ERROR: Reality Marble has collapsed.",
            "警告：發生次元斷層，目標空間已不存在。",
            "Data Corruption Level: OVER 9000.",
            "System call: rm -rf /",
            "I am atomic..."
        ];

        let currentPhrase = 0;
        let currentChar = 0;
        let isDeleting = false;
        const typingElement = document.getElementById('typingScript');

        function type() {
            const fullText = phrases[currentPhrase];

            if (isDeleting) {
                typingElement.textContent = fullText.substring(0, currentChar - 1);
                currentChar--;
            } else {
                typingElement.textContent = fullText.substring(0, currentChar + 1);
                currentChar++;
            }

            if (!isDeleting && currentChar === fullText.length) {
                setTimeout(() => isDeleting = true, 2500);
            } else if (isDeleting && currentChar === 0) {
                isDeleting = false;
                currentPhrase = (currentPhrase + 1) % phrases.length;
            }

            const typingSpeed = isDeleting ? 30 : 70;
            setTimeout(type, typingSpeed);
        }
        type();
    </script>
</body>
</html>
